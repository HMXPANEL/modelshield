<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments — ModelShield Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><strong>ModelShield</strong><span>Admin Panel</span></div>
  <span class="sidebar-section">Overview</span>
  <a href="analytics.html" class="sidebar-link"><span class="icon">📊</span><strong>Analytics</strong></a>
  <span class="sidebar-section">Management</span>
  <a href="users.html" class="sidebar-link"><span class="icon">👥</span><strong>Users</strong></a>
  <a href="models.html" class="sidebar-link"><span class="icon">🤖</span><strong>Models</strong></a>
  <a href="provider_keys.html" class="sidebar-link"><span class="icon">🔐</span><strong>Provider Keys</strong></a>
  <a href="payments.html" class="sidebar-link active"><span class="icon">💳</span><strong>Payments</strong></a>
  <div style="margin-top:auto;padding-top:2rem;">
    <button class="btn btn-ghost btn-sm" style="width:100%;" onclick="logout()"><strong>🚪 Logout</strong></button>
  </div>
</aside>
<div class="main-content">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;flex-wrap:wrap;">
    <button class="hamburger" id="hamburger">☰</button>
    <div style="flex:1;"><h1><strong>💳 Payments</strong></h1><p style="color:var(--text2);"><strong>Verify UPI payments and manage credits</strong></p></div>
    <button class="btn btn-ghost btn-sm" onclick="loadPayments()"><strong>🔄 Refresh</strong></button>
  </div>
  <div id="alert-container"></div>
  <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;">
    <button class="btn btn-primary btn-sm" onclick="filterPayments('all', this)"><strong>All</strong></button>
    <button class="btn btn-ghost btn-sm" onclick="filterPayments('pending_verification', this)"><strong>Pending</strong></button>
    <button class="btn btn-ghost btn-sm" onclick="filterPayments('verified', this)"><strong>Verified</strong></button>
    <button class="btn btn-ghost btn-sm" onclick="filterPayments('rejected', this)"><strong>Rejected</strong></button>
  </div>
  <div id="payments-table"></div>
</div>
<script src="admin.js"></script>
<script>
if (!requireAdmin()) {}
let allPayments = [];
let activeFilter = "all";

async function loadPayments() {
  try {
    allPayments = await apiFetch("/admin/payments") || [];
    renderPayments(activeFilter);
  } catch(e) { showAlert(e.message, "error"); }
}

function filterPayments(f, btn) {
  activeFilter = f;
  document.querySelectorAll(".btn-sm").forEach(b => { if (b.onclick && b.onclick.toString().includes("filterPayments")) b.className = "btn btn-ghost btn-sm"; });
  if (btn) btn.className = "btn btn-primary btn-sm";
  renderPayments(f);
}

function renderPayments(f) {
  const filtered = f === "all" ? allPayments : allPayments.filter(p => p.status === f);
  const el = document.getElementById("payments-table");
  if (!filtered.length) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:2rem;"><p style="color:var(--text2);"><strong>No payments found</strong></p></div>`;
    return;
  }
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th><strong>ID</strong></th><th><strong>User</strong></th><th><strong>Amount</strong></th><th><strong>Credits</strong></th><th><strong>UTR</strong></th><th><strong>Status</strong></th><th><strong>Date</strong></th><th><strong>Actions</strong></th></tr></thead>
    <tbody>${filtered.map(p => `<tr>
      <td><strong>#${p.id}</strong></td>
      <td style="font-size:0.8rem;"><strong>${p.user_email}</strong></td>
      <td><strong style="color:var(--success);">₹${p.amount}</strong></td>
      <td><strong>${formatNum(p.credits)}</strong></td>
      <td style="font-family:var(--mono);font-size:0.8rem;">${p.utr || '<span style="color:var(--text3);">—</span>'}</td>
      <td><span class="badge badge-${p.status==='verified'?'success':p.status==='rejected'?'danger':'warning'}">${p.status.replace(/_/g,' ')}</span></td>
      <td style="font-size:0.75rem;color:var(--text2);">${formatDate(p.created_at)}</td>
      <td>
        ${p.status === 'pending_verification' ? `
          <button class="btn btn-success btn-sm" onclick="verifyPayment(${p.id})" style="margin-right:0.25rem;"><strong>✓ Verify</strong></button>
          <button class="btn btn-danger btn-sm" onclick="rejectPayment(${p.id})"><strong>✗ Reject</strong></button>
        ` : `<span style="color:var(--text3);font-size:0.8rem;">${p.status==='verified'?'✅ Done':'❌ Rejected'}</span>`}
      </td>
    </tr>`).join("")}</tbody>
  </table></div>`;
}

async function verifyPayment(id) {
  if (!confirm("Verify this payment and add credits to user?")) return;
  try {
    const res = await apiFetch(`/admin/payments/${id}/verify`, { method: "POST" });
    if (res) { showAlert(res.message, "success"); loadPayments(); }
  } catch(e) { showAlert(e.message, "error"); }
}

async function rejectPayment(id) {
  if (!confirm("Reject this payment?")) return;
  try {
    const res = await apiFetch(`/admin/payments/${id}/reject`, { method: "POST" });
    if (res) { showAlert("Payment rejected", "success"); loadPayments(); }
  } catch(e) { showAlert(e.message, "error"); }
}

loadPayments();
</script>
</body>
</html>
