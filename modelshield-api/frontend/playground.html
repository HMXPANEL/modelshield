<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playground — ModelShield</title>
<link rel="stylesheet" href="styles.css">
<style>
.chat-wrap { display: flex; flex-direction: column; height: calc(100vh - 220px); min-height: 400px; }
.messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; background: var(--bg); border-radius: var(--radius) var(--radius) 0 0; border: 1px solid var(--border); border-bottom: none; }
.message { max-width: 85%; padding: 0.75rem 1rem; border-radius: var(--radius); font-size: 0.875rem; line-height: 1.6; }
.message.user { align-self: flex-end; background: var(--primary); color: #fff; }
.message.assistant { align-self: flex-start; background: var(--card); border: 1px solid var(--border); color: var(--text); }
.message.system-msg { align-self: center; background: var(--bg3); color: var(--text2); font-size: 0.75rem; font-style: italic; border: 1px solid var(--border); }
.message-role { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; opacity: 0.7; margin-bottom: 0.25rem; }
.input-row { display: flex; gap: 0.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius); padding: 0.75rem; }
.input-row textarea { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 0.6rem 0.75rem; font-family: var(--font); font-size: 0.875rem; resize: none; height: 44px; transition: height 0.1s; }
.input-row textarea:focus { outline: none; border-color: var(--primary); }
.typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--text2); animation: blink 1.2s infinite; margin: 0 2px; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><strong>ModelShield</strong><span style="font-size:0.7rem;color:var(--text3);font-weight:500;">AI API Gateway</span></div>
  <span class="sidebar-section">Main</span>
  <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span><strong>Dashboard</strong></a>
  <a href="api_keys.html" class="sidebar-link"><span class="icon">🔑</span><strong>API Keys</strong></a>
  <a href="models.html" class="sidebar-link"><span class="icon">🤖</span><strong>Models</strong></a>
  <a href="playground.html" class="sidebar-link active"><span class="icon">🎮</span><strong>Playground</strong></a>
  <span class="sidebar-section">Billing</span>
  <a href="usage.html" class="sidebar-link"><span class="icon">📈</span><strong>Usage</strong></a>
  <a href="buy_credits.html" class="sidebar-link"><span class="icon">💳</span><strong>Buy Credits</strong></a>
  <span class="sidebar-section">Help</span>
  <a href="docs.html" class="sidebar-link"><span class="icon">📖</span><strong>Docs</strong></a>
  <div style="margin-top:auto;padding-top:2rem;">
    <button class="btn btn-ghost btn-sm" style="width:100%" onclick="logout()"><strong>🚪 Logout</strong></button>
  </div>
</aside>
<div class="main-content" style="padding-bottom:1rem;">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
    <button class="hamburger" id="hamburger">☰</button>
    <div style="flex:1;"><h1><strong>🎮 Playground</strong></h1><p><strong>Test any AI model directly in your browser</strong></p></div>
    <button class="btn btn-ghost btn-sm" onclick="clearChat()"><strong>🗑 Clear</strong></button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;" id="controls">
    <div>
      <label style="font-size:0.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;display:block;margin-bottom:0.3rem;"><strong>Model</strong></label>
      <select id="model-select" class="form-control" style="font-size:0.825rem;"></select>
    </div>
    <div>
      <label style="font-size:0.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;display:block;margin-bottom:0.3rem;"><strong>API Key</strong></label>
      <select id="key-select" class="form-control" style="font-size:0.825rem;"></select>
    </div>
    <div>
      <label style="font-size:0.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;display:block;margin-bottom:0.3rem;"><strong>Temperature</strong></label>
      <input type="range" id="temp" min="0" max="2" step="0.1" value="0.7" style="width:100%;margin-top:0.5rem;" oninput="document.getElementById('temp-val').textContent=this.value">
    </div>
    <div style="align-self:flex-end;">
      <span style="font-size:0.75rem;color:var(--text2);font-weight:700;" id="temp-val">0.7</span>
    </div>
  </div>
  <div id="alert-container"></div>
  <div class="chat-wrap">
    <div class="messages" id="messages">
      <div class="message system-msg"><strong>Welcome to ModelShield Playground! Select a model and API key, then start chatting.</strong></div>
    </div>
    <div class="input-row">
      <textarea id="user-input" placeholder="Type your message... (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
      <button class="btn btn-primary" id="send-btn" onclick="sendMessage()"><strong>Send</strong></button>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script>
if (!requireAuth()) {}
let chatHistory = [];

async function loadPlayground() {
  const [models, keys] = await Promise.all([apiFetch("/models"), apiFetch("/keys")]);
  const modelSel = document.getElementById("model-select");
  const keySel = document.getElementById("key-select");
  if (models) {
    modelSel.innerHTML = models.map(m => `<option value="${m.name}">${m.display_name} (${m.provider})</option>`).join("");
    const urlModel = new URLSearchParams(location.search).get("model");
    if (urlModel) modelSel.value = urlModel;
  }
  if (keys && keys.length) {
    keySel.innerHTML = keys.filter(k => k.status === "active").map(k => `<option value="${k.key_prefix}">${k.name} (${k.key_prefix})</option>`).join("");
  } else {
    keySel.innerHTML = `<option value="">No API keys — create one first</option>`;
  }
}

function appendMessage(role, content) {
  const el = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `message ${role} fade-in`;
  if (role === "assistant" || role === "user") {
    div.innerHTML = `<div class="message-role"><strong>${role}</strong></div><div>${content.replace(/\n/g, "<br>")}</div>`;
  } else {
    div.innerHTML = `<strong>${content}</strong>`;
  }
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  return div;
}

function showTyping() {
  const el = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "message assistant fade-in";
  div.id = "typing-indicator";
  div.innerHTML = `<div class="message-role"><strong>assistant</strong></div><div><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing-indicator");
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById("user-input");
  const content = input.value.trim();
  if (!content) return;
  const keyPrefix = document.getElementById("key-select").value;
  if (!keyPrefix) { showAlert("Please create an API key first", "error"); return; }
  const model = document.getElementById("model-select").value;
  if (!model) { showAlert("Please select a model", "error"); return; }
  const keys = await apiFetch("/keys");
  const selectedKey = keys && keys.find(k => k.key_prefix.startsWith(keyPrefix.replace("...", "")));
  if (!selectedKey) { showAlert("API key not found. Please create one.", "error"); return; }
  appendMessage("user", content);
  chatHistory.push({ role: "user", content });
  input.value = "";
  input.style.height = "44px";
  setLoading("send-btn", true);
  showTyping();
  try {
    const storedKey = sessionStorage.getItem("playground_key_" + selectedKey.id);
    if (!storedKey) {
      showAlert("Full API key not available in session. Please re-create the key and save it, then use it in the API directly.", "warning");
      removeTyping();
      setLoading("send-btn", false);
      return;
    }
    const temp = parseFloat(document.getElementById("temp").value);
    const res = await fetch(API_BASE + "/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${storedKey}` },
      body: JSON.stringify({ model, messages: chatHistory, temperature: temp, max_tokens: 1024 })
    });
    removeTyping();
    if (!res.ok) {
      const err = await res.json();
      appendMessage("system-msg", `❌ Error: ${err.detail || "Request failed"}`);
    } else {
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || "No response";
      chatHistory.push({ role: "assistant", content: reply });
      appendMessage("assistant", reply);
    }
  } catch (e) {
    removeTyping();
    appendMessage("system-msg", `❌ ${e.message}`);
  }
  setLoading("send-btn", false);
}

function clearChat() {
  chatHistory = [];
  document.getElementById("messages").innerHTML = `<div class="message system-msg"><strong>Chat cleared. Start a new conversation.</strong></div>`;
}

document.getElementById("user-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  const ta = e.target;
  ta.style.height = "44px";
  ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
});

// Note for playground - store key in session when created
window.addEventListener("storage", e => {
  if (e.key === "ms_new_key") {
    const d = JSON.parse(e.newValue || "{}");
    if (d.id && d.key) sessionStorage.setItem("playground_key_" + d.id, d.key);
  }
});

loadPlayground();
</script>
</body>
</html>
