<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — ModelShield Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><strong>ModelShield</strong><span>Admin Panel</span></div>
  <span class="sidebar-section">Overview</span>
  <a href="analytics.html" class="sidebar-link active"><span class="icon">📊</span><strong>Analytics</strong></a>
  <span class="sidebar-section">Management</span>
  <a href="users.html" class="sidebar-link"><span class="icon">👥</span><strong>Users</strong></a>
  <a href="models.html" class="sidebar-link"><span class="icon">🤖</span><strong>Models</strong></a>
  <a href="provider_keys.html" class="sidebar-link"><span class="icon">🔐</span><strong>Provider Keys</strong></a>
  <a href="payments.html" class="sidebar-link"><span class="icon">💳</span><strong>Payments</strong></a>
  <div style="margin-top:auto;padding-top:2rem;">
    <a href="/app/dashboard.html" class="sidebar-link" style="font-size:0.775rem;"><span class="icon">🌐</span><strong>User View</strong></a>
    <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:0.5rem;" onclick="logout()"><strong>🚪 Logout</strong></button>
  </div>
</aside>
<div class="main-content">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;flex-wrap:wrap;">
    <button class="hamburger" id="hamburger">☰</button>
    <div style="flex:1;"><h1><strong>📊 Analytics</strong></h1><p style="color:var(--text2);"><strong>Platform overview and statistics</strong></p></div>
  </div>
  <div class="grid grid-4" id="stats-grid" style="margin-bottom:2rem;">
    <div class="stat-card"><div class="stat-label"><strong>Total Users</strong></div><div class="stat-value" id="total-users">—</div><div class="stat-sub">Registered accounts</div></div>
    <div class="stat-card"><div class="stat-label"><strong>Total Requests</strong></div><div class="stat-value" id="total-reqs">—</div><div class="stat-sub">API calls</div></div>
    <div class="stat-card"><div class="stat-label"><strong>Total Tokens</strong></div><div class="stat-value" id="total-tokens">—</div><div class="stat-sub">Processed</div></div>
    <div class="stat-card"><div class="stat-label"><strong>Revenue</strong></div><div class="stat-value" id="total-rev">—</div><div class="stat-sub">Verified payments</div></div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:1.25rem;"><strong>🤖 Model Usage Breakdown</strong></h3>
    <div id="model-breakdown"></div>
  </div>
</div>
<script src="admin.js"></script>
<script>
if (!requireAdmin()) {}
async function loadAnalytics() {
  try {
    const data = await apiFetch("/admin/analytics");
    if (!data) return;
    document.getElementById("total-users").textContent = formatNum(data.total_users);
    document.getElementById("total-reqs").textContent = formatNum(data.total_requests);
    document.getElementById("total-tokens").textContent = formatNum(data.total_tokens);
    document.getElementById("total-rev").textContent = "₹" + (data.total_revenue || 0).toFixed(2);
    const el = document.getElementById("model-breakdown");
    if (!data.model_breakdown.length) {
      el.innerHTML = `<p style="color:var(--text2);text-align:center;padding:2rem;"><strong>No requests yet</strong></p>`;
      return;
    }
    el.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th><strong>Model</strong></th><th><strong>Requests</strong></th><th><strong>Tokens</strong></th></tr></thead>
      <tbody>${data.model_breakdown.map(m => `<tr>
        <td><strong>${m.model}</strong></td>
        <td><strong>${formatNum(m.requests)}</strong></td>
        <td><strong>${formatNum(m.tokens)}</strong></td>
      </tr>`).join("")}</tbody>
    </table></div>`;
  } catch(e) { document.getElementById("model-breakdown").innerHTML = `<p style="color:var(--danger);"><strong>${e.message}</strong></p>`; }
}
loadAnalytics();
</script>
</body>
</html>
