<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Models — ModelShield Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><strong>ModelShield</strong><span>Admin Panel</span></div>
  <span class="sidebar-section">Overview</span>
  <a href="analytics.html" class="sidebar-link"><span class="icon">📊</span><strong>Analytics</strong></a>
  <span class="sidebar-section">Management</span>
  <a href="users.html" class="sidebar-link"><span class="icon">👥</span><strong>Users</strong></a>
  <a href="models.html" class="sidebar-link active"><span class="icon">🤖</span><strong>Models</strong></a>
  <a href="provider_keys.html" class="sidebar-link"><span class="icon">🔐</span><strong>Provider Keys</strong></a>
  <a href="payments.html" class="sidebar-link"><span class="icon">💳</span><strong>Payments</strong></a>
  <div style="margin-top:auto;padding-top:2rem;">
    <button class="btn btn-ghost btn-sm" style="width:100%;" onclick="logout()"><strong>🚪 Logout</strong></button>
  </div>
</aside>
<div class="main-content">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;">
    <div style="display:flex;align-items:center;gap:1rem;">
      <button class="hamburger" id="hamburger">☰</button>
      <div><h1><strong>🤖 Models</strong></h1><p style="color:var(--text2);"><strong>Manage AI models and routing</strong></p></div>
    </div>
    <button class="btn btn-primary" onclick="openAddModal()"><strong>+ Add Model</strong></button>
  </div>
  <div id="alert-container"></div>
  <div id="models-table"></div>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header"><h3><strong>Add New Model</strong></h3><button class="modal-close" onclick="closeModal('add-modal')">✕</button></div>
    <div class="form-group"><label><strong>Model ID (API name)</strong></label><input type="text" id="m-name" class="form-control" placeholder="e.g. llama-3.1-8b-instant"></div>
    <div class="form-group"><label><strong>Display Name</strong></label><input type="text" id="m-display" class="form-control" placeholder="e.g. Llama 3.1 8B"></div>
    <div class="form-group"><label><strong>Provider</strong></label>
      <select id="m-provider" class="form-control">
        <option value="groq">Groq</option><option value="openai">OpenAI</option><option value="nvidia">NVIDIA</option><option value="together">Together AI</option>
      </select>
    </div>
    <div class="form-group"><label><strong>Endpoint URL</strong></label><input type="text" id="m-endpoint" class="form-control" placeholder="https://api.groq.com/openai/v1/chat/completions"></div>
    <div class="grid grid-2">
      <div class="form-group"><label><strong>Cost/Token</strong></label><input type="number" id="m-cost" class="form-control" value="0.0001" step="0.00001"></div>
      <div class="form-group"><label><strong>Context Length</strong></label><input type="number" id="m-ctx" class="form-control" value="4096"></div>
    </div>
    <div class="form-group"><label><strong>Description</strong></label><input type="text" id="m-desc" class="form-control" placeholder="Brief model description"></div>
    <div class="form-group" style="display:flex;align-items:center;gap:0.5rem;">
      <input type="checkbox" id="m-free" checked style="width:16px;height:16px;">
      <label for="m-free" style="text-transform:none;font-size:0.875rem;"><strong>Free Access (available on free plan)</strong></label>
    </div>
    <button class="btn btn-primary" style="width:100%" id="add-model-btn" onclick="addModel()"><strong>Add Model</strong></button>
  </div>
</div>

<script src="admin.js"></script>
<script>
if (!requireAdmin()) {}

async function loadModels() {
  try {
    const models = await apiFetch("/admin/models");
    if (!models) return;
    document.getElementById("models-table").innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th><strong>ID</strong></th><th><strong>Name</strong></th><th><strong>Provider</strong></th><th><strong>Cost/Token</strong></th><th><strong>Free</strong></th><th><strong>Status</strong></th><th><strong>Actions</strong></th></tr></thead>
      <tbody>${models.map(m => `<tr>
        <td><strong>#${m.id}</strong></td>
        <td><strong>${m.display_name}</strong><div style="font-size:0.7rem;color:var(--text3);font-family:var(--mono);">${m.name}</div></td>
        <td><span class="badge badge-primary"><strong>${m.provider.toUpperCase()}</strong></span></td>
        <td style="font-family:var(--mono);font-size:0.8rem;">${m.cost_per_token}</td>
        <td>${m.free_access ? '<span class="badge badge-success"><strong>Yes</strong></span>' : '<span class="badge badge-warning"><strong>No</strong></span>'}</td>
        <td><span class="badge badge-${m.status==='active'?'success':'danger'}">${m.status}</span></td>
        <td style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-sm btn-${m.status==='active'?'warning':'success'}" onclick="toggleModel(${m.id}, '${m.status==='active'?'inactive':'active'}')"><strong>${m.status==='active'?'Disable':'Enable'}</strong></button>
          <button class="btn btn-sm btn-${m.free_access?'ghost':'success'}" onclick="toggleFree(${m.id}, ${!m.free_access})"><strong>${m.free_access?'Make Paid':'Make Free'}</strong></button>
        </td>
      </tr>`).join("")}</tbody>
    </table></div>`;
  } catch(e) { showAlert(e.message, "error"); }
}

function openAddModal() { document.getElementById("add-modal").classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

async function toggleModel(id, status) {
  try {
    await apiFetch(`/admin/models/${id}`, { method: "PATCH", body: JSON.stringify({ status }) });
    showAlert("Model updated", "success"); loadModels();
  } catch(e) { showAlert(e.message, "error"); }
}

async function toggleFree(id, freeAccess) {
  try {
    await apiFetch(`/admin/models/${id}`, { method: "PATCH", body: JSON.stringify({ free_access: freeAccess }) });
    showAlert("Model updated", "success"); loadModels();
  } catch(e) { showAlert(e.message, "error"); }
}

async function addModel() {
  const data = {
    name: document.getElementById("m-name").value.trim(),
    display_name: document.getElementById("m-display").value.trim(),
    provider: document.getElementById("m-provider").value,
    endpoint: document.getElementById("m-endpoint").value.trim(),
    cost_per_token: parseFloat(document.getElementById("m-cost").value) || 0.0001,
    context_length: parseInt(document.getElementById("m-ctx").value) || 4096,
    description: document.getElementById("m-desc").value.trim(),
    free_access: document.getElementById("m-free").checked
  };
  if (!data.name || !data.display_name || !data.endpoint) { showAlert("Fill required fields", "error"); return; }
  setLoading("add-model-btn", true);
  try {
    const res = await apiFetch("/admin/models", { method: "POST", body: JSON.stringify(data) });
    if (res) { showAlert("Model added!", "success"); closeModal("add-modal"); loadModels(); }
  } catch(e) { showAlert(e.message, "error"); }
  setLoading("add-model-btn", false);
}

loadModels();
</script>
</body>
</html>
