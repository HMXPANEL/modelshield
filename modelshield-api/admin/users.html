<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users — ModelShield Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><strong>ModelShield</strong><span>Admin Panel</span></div>
  <span class="sidebar-section">Overview</span>
  <a href="analytics.html" class="sidebar-link"><span class="icon">📊</span><strong>Analytics</strong></a>
  <span class="sidebar-section">Management</span>
  <a href="users.html" class="sidebar-link active"><span class="icon">👥</span><strong>Users</strong></a>
  <a href="models.html" class="sidebar-link"><span class="icon">🤖</span><strong>Models</strong></a>
  <a href="provider_keys.html" class="sidebar-link"><span class="icon">🔐</span><strong>Provider Keys</strong></a>
  <a href="payments.html" class="sidebar-link"><span class="icon">💳</span><strong>Payments</strong></a>
  <div style="margin-top:auto;padding-top:2rem;">
    <button class="btn btn-ghost btn-sm" style="width:100%;" onclick="logout()"><strong>🚪 Logout</strong></button>
  </div>
</aside>
<div class="main-content">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;">
    <button class="hamburger" id="hamburger">☰</button>
    <div><h1><strong>👥 Users</strong></h1><p style="color:var(--text2);"><strong>Manage platform users</strong></p></div>
  </div>
  <div id="alert-container"></div>
  <div id="users-table"></div>
</div>

<!-- Add Credits Modal -->
<div class="modal-overlay" id="credits-modal">
  <div class="modal">
    <div class="modal-header">
      <h3><strong>Add Credits</strong></h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <p style="color:var(--text2);margin-bottom:1rem;font-size:0.875rem;"><strong>Adding credits to: <span id="modal-email">—</span></strong></p>
    <div class="form-group">
      <label><strong>Credits Amount</strong></label>
      <input type="number" id="credits-amount" class="form-control" placeholder="e.g. 500" min="1" step="1">
    </div>
    <button class="btn btn-success" style="width:100%" id="add-credits-btn" onclick="addCredits()"><strong>Add Credits</strong></button>
  </div>
</div>

<script src="admin.js"></script>
<script>
if (!requireAdmin()) {}
let selectedUserId = null;

async function loadUsers() {
  try {
    const users = await apiFetch("/admin/users");
    if (!users) return;
    document.getElementById("users-table").innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th><strong>ID</strong></th><th><strong>Email</strong></th><th><strong>Credits</strong></th><th><strong>Keys</strong></th><th><strong>Admin</strong></th><th><strong>Joined</strong></th><th><strong>Actions</strong></th></tr></thead>
      <tbody>${users.map(u => `<tr>
        <td><strong>#${u.id}</strong></td>
        <td><strong>${u.email}</strong></td>
        <td><strong style="color:var(--success);">${parseFloat(u.credits).toFixed(2)}</strong></td>
        <td><strong>${u.key_count}</strong></td>
        <td>${u.is_admin ? '<span class="badge badge-primary"><strong>Admin</strong></span>' : '<span class="badge badge-ghost"><strong>User</strong></span>'}</td>
        <td style="font-size:0.8rem;color:var(--text2);">${formatDate(u.created_at)}</td>
        <td><button class="btn btn-success btn-sm" onclick="openCreditsModal(${u.id}, '${u.email}')"><strong>+ Credits</strong></button></td>
      </tr>`).join("")}</tbody>
    </table></div>`;
  } catch(e) { showAlert(e.message, "error"); }
}

function openCreditsModal(id, email) {
  selectedUserId = id;
  document.getElementById("modal-email").textContent = email;
  document.getElementById("credits-amount").value = "";
  document.getElementById("credits-modal").classList.add("open");
}

function closeModal() { document.getElementById("credits-modal").classList.remove("open"); }

async function addCredits() {
  const amount = parseFloat(document.getElementById("credits-amount").value);
  if (!amount || amount <= 0) { showAlert("Enter valid amount", "error"); return; }
  setLoading("add-credits-btn", true);
  try {
    const data = await apiFetch(`/admin/users/${selectedUserId}/add-credits`, { method: "POST", body: JSON.stringify({ amount }) });
    if (data) { showAlert(data.message, "success"); closeModal(); loadUsers(); }
  } catch(e) { showAlert(e.message, "error"); }
  setLoading("add-credits-btn", false);
}

loadUsers();
</script>
</body>
</html>
