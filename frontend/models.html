<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Models — ModelShield</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><strong>ModelShield</strong><span style="font-size:0.7rem;color:var(--text3);font-weight:500;">AI API Gateway</span></div>
  <span class="sidebar-section">Main</span>
  <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span><strong>Dashboard</strong></a>
  <a href="api_keys.html" class="sidebar-link"><span class="icon">🔑</span><strong>API Keys</strong></a>
  <a href="models.html" class="sidebar-link active"><span class="icon">🤖</span><strong>Models</strong></a>
  <a href="playground.html" class="sidebar-link"><span class="icon">🎮</span><strong>Playground</strong></a>
  <span class="sidebar-section">Billing</span>
  <a href="usage.html" class="sidebar-link"><span class="icon">📈</span><strong>Usage</strong></a>
  <a href="buy_credits.html" class="sidebar-link"><span class="icon">💳</span><strong>Buy Credits</strong></a>
  <span class="sidebar-section">Help</span>
  <a href="docs.html" class="sidebar-link"><span class="icon">📖</span><strong>Docs</strong></a>
  <div style="margin-top:auto;padding-top:2rem;">
    <button class="btn btn-ghost btn-sm" style="width:100%" onclick="logout()"><strong>🚪 Logout</strong></button>
  </div>
</aside>
<div class="main-content">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;">
    <button class="hamburger" id="hamburger">☰</button>
    <div>
      <h1><strong>🤖 Available Models</strong></h1>
      <p><strong>All models accessible through the ModelShield gateway</strong></p>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="filterModels('all', this)"><strong>All Models</strong></button>
    <button class="tab" onclick="filterModels('free', this)"><strong>Free Access</strong></button>
    <button class="tab" onclick="filterModels('groq', this)"><strong>Groq</strong></button>
    <button class="tab" onclick="filterModels('openai', this)"><strong>OpenAI</strong></button>
    <button class="tab" onclick="filterModels('nvidia', this)"><strong>NVIDIA</strong></button>
    <button class="tab" onclick="filterModels('together', this)"><strong>Together AI</strong></button>
  </div>
  <div id="models-grid" class="grid grid-3"></div>
</div>
<script src="app.js"></script>
<script>
if (!requireAuth()) {}
let allModels = [];

const providerColors = { groq: "#F97316", openai: "#10A37F", nvidia: "#76B900", together: "#8B5CF6" };
const providerIcons = { groq: "⚡", openai: "🟢", nvidia: "🟩", together: "🟣" };

async function loadModels() {
  try {
    allModels = await apiFetch("/models") || [];
    renderModels(allModels);
  } catch (e) { document.getElementById("models-grid").innerHTML = `<p style="color:var(--danger);"><strong>${e.message}</strong></p>`; }
}

function renderModels(models) {
  const el = document.getElementById("models-grid");
  if (!models.length) { el.innerHTML = `<div class="empty-state"><div class="icon">🤖</div><p><strong>No models found</strong></p></div>`; return; }
  el.innerHTML = models.map(m => `
    <div class="card card-hover fade-in">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem;">
        <div>
          <span style="font-size:1.2rem;margin-right:0.5rem;">${providerIcons[m.provider] || "🤖"}</span>
          <strong style="font-size:0.95rem;">${m.display_name}</strong>
        </div>
        <span class="badge badge-${m.free_access ? 'success' : 'warning'}">${m.free_access ? 'Free' : 'Paid'}</span>
      </div>
      <p style="font-size:0.8rem;margin-bottom:0.75rem;min-height:2.5rem;">${m.description || 'High performance AI model'}</p>
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.75rem;">
        <span class="badge" style="background:rgba(${m.provider==='groq'?'249,115,22':'100,100,200'},0.15);color:${providerColors[m.provider]||'var(--text2)'}"><strong>${m.provider.toUpperCase()}</strong></span>
        <span class="badge badge-ghost"><strong>${formatNumber(m.context_length)} ctx</strong></span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding-top:0.75rem;border-top:1px solid var(--border);">
        <span style="font-size:0.75rem;color:var(--text2);"><strong>Cost:</strong> ${m.cost_per_token}/token</span>
        <div style="display:flex;gap:0.5rem;">
          <a href="playground.html?model=${encodeURIComponent(m.name)}" class="btn btn-accent btn-sm"><strong>Try</strong></a>
        </div>
      </div>
      <div style="margin-top:0.5rem;background:var(--bg3);border-radius:4px;padding:0.4rem 0.6rem;">
        <code style="font-family:var(--mono);font-size:0.7rem;color:var(--text2);">${m.name}</code>
      </div>
    </div>
  `).join("");
}

function filterModels(filter, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  if (filter === "all") renderModels(allModels);
  else if (filter === "free") renderModels(allModels.filter(m => m.free_access));
  else renderModels(allModels.filter(m => m.provider === filter));
}

loadModels();
</script>
</body>
</html>
