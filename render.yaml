services:
  - type: web
    name: modelshield-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: modelshield-db
          property: connectionString
      - key: UPI_ID
        value: yourname@upi
      - key: UPI_NAME
        value: ModelShield
      - key: ALLOWED_ORIGINS
        value: https://modelshield-api.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: modelshield-db
    databaseName: modelshield
    user: modelshield
